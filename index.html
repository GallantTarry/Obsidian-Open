<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>土块的学术库</title>
  <!-- 增加 type 属性，强制规范读取，支持 ICO 的 Alpha 透明通道 -->
  <link rel="icon" href="academia.ico" type="image/x-icon">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="个人学术知识库">
  <!-- 确保移动端视口完美缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-darcula.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --theme-color: #10b981; 
      --theme-color-light: rgba(16, 185, 129, 0.15);
      --text-main: #f1f5f9; 
      --text-muted: #cbd5e1; 
    }

    /* ====== 1. 全局背景 ====== */
    body {
      background-color: #182848 !important; 
      background-image: radial-gradient(circle at top right, #2d5a88, #182848) !important;
      background-attachment: fixed !important; 
      background-size: cover !important;
      background-repeat: no-repeat !important;
      color: var(--text-main) !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      font-size: 16px; 
    }

    /* ====== 2. 侧边栏样式 ====== */
    .sidebar {
      background: rgba(20, 32, 56, 0.9) !important;
      border-right: 1px solid rgba(255, 255, 255, 0.15) !important;
      padding-top: 30px;
      box-shadow: 2px 0 15px rgba(0,0,0,0.4);
    }
    .sidebar h1 {
      font-family: 'Noto Serif SC', serif !important;
      color: var(--theme-color) !important;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 30px;
    }
    .sidebar h1 a { color: inherit; }
    .sidebar-nav > ul > li > p {
        color: #f1f5f9 !important; 
        font-weight: 600;
        font-size: 14px;
        margin-top: 15px;
        margin-bottom: 5px;
        padding-left: 15px;
        border-left: 3px solid var(--theme-color);
    }
    .sidebar-nav ul li a {
      color: var(--text-muted) !important;
      font-size: 13px;
      padding: 8px 15px;
      margin: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s ease;
      cursor: pointer !important;
      white-space: normal; 
      line-height: 1.4;
    }
    .sidebar-nav ul li a:hover {
      background: rgba(255, 255, 255, 0.1) !important;
      color: #ffffff !important; 
    }
    .sidebar-nav ul li.active > a {
      background: var(--theme-color-light) !important;
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 3px solid var(--theme-color) !important;
    }

    /* ====== 3. 主内容区与底部留白修复 ====== */
    /* 强制父级容器底部留出足够的物理空间，确保不被滚动条吞噬 */
    main {
      padding-bottom: 120px !important; 
    }
    .content {
      padding-top: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .markdown-section {
      /* 提亮框内背景，使用更明亮的深灰蓝，保持与外层背景的区分 */
      background: rgba(28, 43, 70, 0.92) !important;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
      border-radius: 16px !important; 
      padding: 50px 70px;
      max-width: 900px;
      width: 100%;
      color: var(--text-main);
      position: relative;
      z-index: 10; 
      /* 框体自身的下外边距，配合父级的 padding 形成双重保险 */
      margin-bottom: 60px !important; 
    }

    .markdown-section h1, .markdown-section h2, .markdown-section h3,
    .markdown-section h4, .markdown-section h5, .markdown-section h6 {
      font-family: 'Noto Serif SC', serif !important;
      color: #ffffff !important; 
      font-weight: 600;
    }
    .markdown-section h1:first-of-type {
      color: var(--theme-color) !important;
      font-size: 38px !important;
      font-weight: 900;
      text-align: center;
      margin-bottom: 40px;
      border-bottom: none !important;
    }
    .markdown-section h2, .markdown-section h3 {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
      padding-bottom: 10px;
      margin-top: 35px;
    }
    .markdown-section p, .markdown-section li {
      font-size: 16px;
      line-height: 1.8;
      color: #f1f5f9; /* 提亮正文字体适配提亮后的面板背景 */
    }
    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
    }
    .markdown-section a:hover {
      text-decoration: underline;
    }

    /* ====== 4. 表格 ====== */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 25px 0;
      background-color: transparent;
    }
    .markdown-section table th, .markdown-section table td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 15px;
      color: #ffffff !important; 
    }
    .markdown-section table th {
      background-color: rgba(16, 185, 129, 0.4); 
      font-weight: 900;
      text-align: left;
    }
    .markdown-section table tr:nth-child(odd) {
      background-color: rgba(255, 255, 255, 0.05);
    }
    .markdown-section table tr:nth-child(even) {
      background-color: rgba(0, 0, 0, 0.3); 
    }

    /* ====== 5. 代码块深度接管 ====== */
    .markdown-section code {
      background-color: rgba(0, 0, 0, 0.3) !important;
      color: #ffc66d !important; 
      padding: 3px 6px;
      border-radius: 4px;
      border: none !important;
      font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace !important;
    }
    .markdown-section pre {
      background-color: #2b2b2b !important; 
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4) !important; 
      padding: 16px !important;
    }
    .markdown-section pre code {
      background-color: transparent !important; 
      color: #a9b7c6 !important; 
      border: none !important;
      border-radius: 0 !important; 
      padding: 0 !important;       
      box-shadow: none !important;
    }
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      padding: 10px 20px;
      border-radius: 0 8px 8px 0;
    }

    /* ========================================= */
    /* ====== 6. 移动端(手机)深度完美适配 ====== */
    /* ========================================= */
    @media screen and (max-width: 768px) {
      /* 缩小主面板内边距，给手机屏幕留出阅读空间 */
      .markdown-section {
        padding: 30px 20px !important; 
        border-radius: 12px !important; 
        margin-top: 10px !important;
      }
      
      /* 美化左下角抽屉按钮 (改造成圆形质感玻璃悬浮按钮) */
      .sidebar-toggle {
        background: var(--theme-color) !important; 
        border: 2px solid rgba(255,255,255,0.2) !important;
        border-radius: 50% !important; /* 强制变圆 */
        width: 48px !important;
        height: 48px !important;
        bottom: 30px !important; /* 提高位置防止挡住屏幕底端 */
        left: 20px !important;
        padding: 12px !important;
        box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 15px rgba(16, 185, 129, 0.4) !important; /* 立体高光阴影 */
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-around !important;
        align-items: center !important;
        transition: transform 0.2s ease !important;
      }

      /* 按钮按下的物理按压反馈 */
      .sidebar-toggle:active {
        transform: scale(0.9) !important; 
      }

      /* 重绘里面的三道横杠菜单线，使其居中纯白且圆润 */
      .sidebar-toggle span {
        background-color: #ffffff !important; 
        width: 22px !important;
        height: 3px !important;
        border-radius: 2px !important;
        margin: 0 !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">系统初始化中...</div>
  
  <script>
    window.$docsify = {
      name: '土块的学术库', 
      repo: '', 
      loadSidebar: true, 
      subMaxLevel: 3, 
      sidebarDisplayLevel: 1, 
      auto2top: true,
      routerMode: 'hash'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>

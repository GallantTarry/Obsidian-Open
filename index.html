<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>土块的学术库</title>
  <link rel="icon" href="academia.ico">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="个人学术知识库">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- 引入默认的主题样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- 引入侧边栏折叠插件样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  
  <!-- 引入 IDEA (Darcula) 风格的代码高亮主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-darcula.min.css">

  <!-- 引入专业学术字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --theme-color: #10b981; 
      --theme-color-light: rgba(16, 185, 129, 0.15);
      --text-main: #f1f5f9; 
      --text-muted: #cbd5e1; 
    }

    /* ====== 1. 全局背景：整体提亮，呈现明快的北冰蓝 ====== */
    body {
      background-color: #182848 !important; 
      background-image: radial-gradient(circle at top right, #2d5a88, #182848) !important;
      background-attachment: fixed !important; 
      background-size: cover !important;
      background-repeat: no-repeat !important;
      color: var(--text-main) !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      font-size: 16px; 
    }

    /* ====== 2. 侧边栏样式 ====== */
    .sidebar {
      background: rgba(20, 32, 56, 0.85) !important;
      border-right: 1px solid rgba(255, 255, 255, 0.15) !important;
      padding-top: 30px;
      box-shadow: 2px 0 15px rgba(0,0,0,0.4);
    }

    .sidebar h1 {
      font-family: 'Noto Serif SC', serif !important;
      color: var(--theme-color) !important;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 30px;
    }
    .sidebar h1 a { color: inherit; }

    .sidebar-nav > ul > li > p {
        color: #f1f5f9 !important; 
        font-weight: 600;
        font-size: 14px;
        margin-top: 15px;
        margin-bottom: 5px;
        padding-left: 15px;
        border-left: 3px solid var(--theme-color);
    }

    .sidebar-nav ul li a {
      color: var(--text-muted) !important;
      font-size: 13px;
      padding: 8px 15px;
      margin: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s ease;
      cursor: pointer !important;
      white-space: normal; 
      line-height: 1.4;
    }

    .sidebar-nav ul li a:hover {
      background: rgba(255, 255, 255, 0.1) !important;
      color: #ffffff !important; 
    }

    .sidebar-nav ul li.active > a {
      background: var(--theme-color-light) !important;
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 3px solid var(--theme-color) !important;
    }

    /* ====== 3. 主内容区：底部留白与面板圆角 ====== */
    .content {
      padding-top: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .markdown-section {
      background: rgba(11, 15, 25, 0.95) !important;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
      border-radius: 16px !important; 
      padding: 50px 70px;
      max-width: 900px;
      width: 100%;
      color: var(--text-main);
      position: relative;
      z-index: 10; 
      margin-bottom: 100px !important; 
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      font-family: 'Noto Serif SC', serif !important;
      color: #ffffff !important; 
      font-weight: 600;
    }

    .markdown-section h1:first-of-type {
      color: var(--theme-color) !important;
      font-size: 38px !important;
      font-weight: 900;
      text-align: center;
      margin-bottom: 40px;
      border-bottom: none !important;
    }

    .markdown-section h2, 
    .markdown-section h3 {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
      padding-bottom: 10px;
      margin-top: 35px;
    }

    .markdown-section p, 
    .markdown-section li {
      font-size: 16px;
      line-height: 1.8;
      color: #e2e8f0; 
    }

    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
    }
    .markdown-section a:hover {
      text-decoration: underline;
    }

    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 25px 0;
      background-color: transparent;
    }
    
    .markdown-section table th,
    .markdown-section table td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 15px;
      color: #f1f5f9 !important; 
    }
    
    .markdown-section table th {
      background-color: rgba(16, 185, 129, 0.3); 
      font-weight: 900;
      text-align: left;
    }
    
    .markdown-section table tr:nth-child(odd) {
      background-color: rgba(255, 255, 255, 0.05);
    }
    
    .markdown-section table tr:nth-child(even) {
      background-color: rgba(0, 0, 0, 0.4); 
    }

    /* ====== 4. 彻底镇压 Vue.css 的瞎搞代码样式 ====== */
    /* (1) 修复行内小段代码（去白底，换成 IDEA 橙黄色，保留小圆角） */
    .markdown-section code {
      background-color: rgba(255, 255, 255, 0.1) !important;
      color: #ffc66d !important; 
      padding: 3px 6px;
      border-radius: 4px;
      border: none !important;
      font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace !important;
    }

    /* (2) 修复多行代码容器：只给外层 pre 画框，消除恶心的“嵌套”感 */
    .markdown-section pre {
      background-color: #2b2b2b !important; 
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4) !important; 
      padding: 16px !important;
    }
    
    /* (3) 强行清空多行代码内部的 code 标签的背景和边框，让它完美融入外层 pre */
    .markdown-section pre code {
      background-color: transparent !important; 
      color: #a9b7c6 !important; 
      border: none !important;
      border-radius: 0 !important; /* 清除内层圆角 */
      padding: 0 !important;       /* 清除内层边距 */
      box-shadow: none !important;
    }

    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      padding: 10px 20px;
      border-radius: 0 8px 8px 0;
    }
  </style>
</head>
<body>
  <div id="app">系统初始化中...</div>
  
  <script>
    window.$docsify = {
      name: '土块的学术库', 
      repo: '', 
      loadSidebar: true, 
      subMaxLevel: 3, 
      sidebarDisplayLevel: 1, 
      auto2top: true,
      routerMode: 'hash'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>

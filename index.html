<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>土块的学术库</title>
  <!-- 设置 ico 图标 -->
  <link rel="icon" href="academia.ico">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="个人学术知识库">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- 引入默认的主题样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- 引入侧边栏折叠插件样式 (实现下拉框必须) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  
  <!-- 引入 IDEA (Darcula) 风格的代码高亮主题，恢复彩色代码风格 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-darcula.min.css">

  <!-- 引入专业学术字体：Inter (正文) + Noto Serif SC (标题) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      /* 学术沉稳的翡翠绿 */
      --theme-color: #10b981; 
      --theme-color-light: rgba(16, 185, 129, 0.15);
      /* 提亮正文主体，但去除了纯白(#ffffff)，使用柔和的雪白(#f1f5f9)防止刺眼 */
      --text-main: #f1f5f9; 
      --text-muted: #cbd5e1; 
      --bg-dark: #0f172a;
    }

    /* ====== 1. 全局背景：带有北冰蓝氛围的深邃渐变 ====== */
    body {
      background-color: var(--bg-dark) !important;
      background-image: radial-gradient(circle at top right, #0f2b4a, #020617);
      color: var(--text-main) !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      font-size: 16px; 
    }

    /* ====== 2. 侧边栏修复与强化 ====== */
    .sidebar {
      background: rgba(15, 23, 42, 0.85) !important;
      border-right: 1px solid rgba(255, 255, 255, 0.1) !important;
      padding-top: 30px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }

    .sidebar h1 {
      font-family: 'Noto Serif SC', serif !important;
      color: var(--theme-color) !important;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar h1 a { color: inherit; }

    /* 侧边栏层级标题 */
    .sidebar-nav > ul > li > p {
        color: #f1f5f9 !important; /* 柔和白 */
        font-weight: 600;
        font-size: 14px;
        margin-top: 15px;
        margin-bottom: 5px;
        padding-left: 15px;
        border-left: 3px solid var(--theme-color);
    }

    /* 侧边栏可点击的链接 */
    .sidebar-nav ul li a {
      color: var(--text-muted) !important;
      font-size: 13px;
      padding: 8px 15px;
      margin: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s ease;
      cursor: pointer !important;
      white-space: normal; 
      line-height: 1.4;
    }

    .sidebar-nav ul li a:hover {
      background: rgba(255, 255, 255, 0.1) !important;
      color: #f8fafc !important; /* 悬浮时稍亮，但不是死白 */
    }

    .sidebar-nav ul li.active > a {
      background: var(--theme-color-light) !important;
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 3px solid var(--theme-color) !important;
    }

    /* ====== 3. 主内容区：足够长，预留底部滚动空间 ====== */
    .content {
      padding-top: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .markdown-section {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      border-radius: 16px;
      padding: 50px 70px;
      max-width: 900px;
      width: 100%;
      color: var(--text-main);
      position: relative;
      z-index: 10; 
      min-height: calc(100vh - 120px);
      margin-bottom: 80px; 
    }

    /* 核心修复：强制接管所有层级标题 (h1-h6)，解决 ## 和 ### 等标题灰度太大的问题 */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      font-family: 'Noto Serif SC', serif !important;
      color: #f1f5f9 !important; /* 统一提亮，不让副标题变暗灰 */
      font-weight: 600;
    }

    /* 首页 README 特大标题，保持主题色 */
    .markdown-section h1:first-of-type {
      color: var(--theme-color) !important;
      font-size: 38px !important;
      font-weight: 900;
      text-align: center;
      margin-bottom: 40px;
      border-bottom: none !important;
    }

    /* 正文标题底边框 */
    .markdown-section h2, 
    .markdown-section h3 {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
      padding-bottom: 10px;
      margin-top: 35px;
    }

    /* 正文内容 */
    .markdown-section p, 
    .markdown-section li {
      font-size: 16px;
      line-height: 1.8;
      color: #e2e8f0; /* 正文比标题稍微低一个亮度，形成层次感 */
    }

    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
    }
    .markdown-section a:hover {
      text-decoration: underline;
    }

    /* ====== 4. 表格修复 ====== */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 25px 0;
      background-color: transparent;
    }
    
    .markdown-section table th,
    .markdown-section table td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 15px;
      color: #f1f5f9 !important; /* 柔和白字，确保斑马纹上都能看清 */
    }
    
    .markdown-section table th {
      background-color: rgba(16, 185, 129, 0.3); 
      font-weight: 900;
      text-align: left;
    }
    
    .markdown-section table tr:nth-child(odd) {
      background-color: rgba(255, 255, 255, 0.05);
    }
    
    .markdown-section table tr:nth-child(even) {
      background-color: rgba(0, 0, 0, 0.4); 
    }

    /* ====== 5. IDEA 风格代码块 ====== */
    /* 移除了强行指定代码颜色的代码，将着色权交还给 Prism.js */
    .markdown-section pre {
      background: #2b2b2b !important; /* 经典的 IDEA Darcula 深灰背景色 */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* 增加代码块立体感 */
    }
    
    .markdown-section pre,
    .markdown-section code {
      /* 加入 JetBrains 字体，更有写 Java 的感觉 */
      font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace !important;
    }

    /* 引用块 */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      padding: 10px 20px;
      border-radius: 0 8px 8px 0;
    }
  </style>
</head>
<body>
  <div id="app">系统初始化中...</div>
  
  <script>
    window.$docsify = {
      name: '土块的学术库', 
      repo: '', 
      loadSidebar: true, 
      subMaxLevel: 3, 
      sidebarDisplayLevel: 1, 
      auto2top: true,
      routerMode: 'hash'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  
  <!-- 引入常用语言高亮支持 (如果你的笔记里有 Java 代码，加上这个会让高亮更精准) -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>

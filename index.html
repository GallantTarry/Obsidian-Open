<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>土块的宝藏库</title>
  <link rel="icon" href="academia.ico" type="image/x-icon">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="宝藏库">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-vsc-dark-plus.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      /* 主操作色：依然保留翠绿，但更沉稳 */
      --theme-color: #10b981; 
      
      /* 全球主流极客暗色体系 (Zinc - 无蓝调的纯粹黑灰) */
      --bg-body: #09090b;       /* 极深底色 */
      --bg-sidebar: #121214;    /* 侧边栏稍亮 */
      --bg-card: #18181b;       /* 内容卡片底色 */
      --border-color: #27272a;  /* 柔和边界线 */
      
      /* 柔和护眼文本体系 */
      --text-title: #f4f4f5;    /* 标题亮白 */
      --text-main: #d4d4d8;     /* 正文星光灰，非纯白 */
      --text-muted: #a1a1aa;    /* 弱化文本 */
    }

    /* ====== 1. 全局极致暗黑背景 ====== */
    body {
      background-color: var(--bg-body) !important; 
      color: var(--text-main) !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      font-size: 16px; 
      -webkit-font-smoothing: antialiased;
    }

    /* ====== 2. 侧边栏：去蓝调，纯粹极简 ====== */
    .sidebar {
      background: var(--bg-sidebar) !important;
      border-right: 1px solid var(--border-color) !important;
      padding-top: 40px;
    }
    .sidebar h1 {
      font-family: 'Noto Serif SC', serif !important;
      color: var(--text-title) !important;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 30px;
    }
    .sidebar h1 strong {
      color: var(--theme-color);
    }
    .sidebar-nav > ul > li > p {
        color: var(--text-title) !important; 
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 20px;
        margin-bottom: 8px;
        padding-left: 20px;
    }
    .sidebar-nav ul li a {
      color: var(--text-muted) !important;
      font-size: 14px;
      padding: 8px 20px;
      margin: 2px 0;
      transition: all 0.2s ease;
      cursor: pointer !important;
    }
    .sidebar-nav ul li a:hover {
      background: rgba(255, 255, 255, 0.05) !important;
      color: var(--text-title) !important; 
    }
    .sidebar-nav ul li.active > a {
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 3px solid var(--theme-color) !important;
      background: rgba(16, 185, 129, 0.08) !important;
    }

    /* ====== 3. 主内容区 ====== */
    main { padding-bottom: 80px !important; }
    .content {
      padding-top: 60px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .markdown-section {
      background: var(--bg-card) !important;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      border-radius: 16px !important; 
      padding: 60px 80px;
      max-width: 900px;
      width: 100%;
      color: var(--text-main);
      margin-bottom: 60px !important; 
    }

    /* ========================================= */
    /* ====== 4. MD语法多色彩语义化系统 ====== */
    /* ========================================= */

    .markdown-section h1, .markdown-section h2, .markdown-section h3,
    .markdown-section h4, .markdown-section h5, .markdown-section h6 {
      font-family: 'Noto Serif SC', serif !important;
      font-weight: 600;
      margin-top: 2em;
      margin-bottom: 1em;
    }
    
    .markdown-section h1:first-of-type {
      font-size: 40px !important;
      font-weight: 900;
      text-align: center;
      margin-bottom: 50px;
      margin-top: 0;
      background: linear-gradient(135deg, #10b981, #3b82f6); 
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: none !important;
    }
    
    .markdown-section h2 {
      color: #f4f4f5 !important; 
      border-bottom: 1px solid var(--border-color) !important;
      padding-bottom: 12px;
    }
    
    .markdown-section h3 { color: #10b981 !important; }
    .markdown-section h4 { color: #a78bfa !important; }

    .markdown-section p {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-main); 
    }

    .markdown-section strong {
      color: #fb923c !important;
      font-weight: 700;
    }

    .markdown-section em {
      color: #f472b6 !important;
      font-style: italic;
    }

    .markdown-section del {
      color: #71717a !important;
    }

    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .markdown-section a:hover {
      border-bottom-color: var(--theme-color);
    }

    .markdown-section ul { padding-left: 1.5rem; }
    .markdown-section ul > li { line-height: 1.8; margin-bottom: 8px; }
    .markdown-section ul > li::marker { color: #10b981; font-weight: bold; } 
    .markdown-section ol > li::marker { color: #fb923c; font-weight: bold; } 

    .markdown-section blockquote {
      border-left: 4px solid #8b5cf6;
      background: rgba(139, 92, 246, 0.08); 
      color: #c4b5fd; 
      padding: 16px 24px;
      border-radius: 0 8px 8px 0;
      margin: 2em 0;
    }
    .markdown-section blockquote p {
      color: inherit; 
      margin: 0;
    }

    .markdown-section code {
      background-color: #27272a !important;
      color: #fca5a5 !important; 
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 0.9em;
      font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace !important;
      border: 1px solid rgba(255,255,255,0.05) !important;
    }

    .markdown-section pre {
      background-color: #0d0d0f !important; 
      border: 1px solid var(--border-color) !important;
      border-radius: 12px !important;
      padding: 20px !important;
      margin: 24px 0;
    }
    .markdown-section pre code {
      background-color: transparent !important; 
      border: none !important;
      padding: 0 !important;
      color: #d4d4d8 !important; 
    }

    /* ========================================= */
    /* ====== 5. 表格：非纯白护眼与暗色斑马纹 ====== */
    /* ========================================= */
    .markdown-section table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 30px 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }
    
    .markdown-section table th, .markdown-section table td {
      padding: 14px 20px;
      color: #d4d4d8 !important; 
      border-bottom: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color); 
      transition: background-color 0.2s ease, color 0.2s ease; 
    }
    .markdown-section table th:last-child, 
    .markdown-section table td:last-child {
      border-right: none;
    }

    .markdown-section table th {
      background-color: #27272a; 
      color: #f4f4f5 !important; 
      font-weight: 600;
      text-align: left;
    }
    
    .markdown-section table tr:nth-child(even) td {
      background-color: #1f1f22; 
    }
    .markdown-section table tr:nth-child(odd) td {
      background-color: transparent;
    }
    
    .markdown-section table tr:hover td {
      background-color: #27272a !important; 
      color: #e4e4e7 !important; 
    }
    
    .markdown-section table tr:last-child td {
      border-bottom: none;
    }

    /* ========================================= */
    /* ====== 6. 悬浮辅助按钮 (灰色圆点版) ====== */
    /* ========================================= */
    
    .sidebar-toggle {
      display: flex !important;
      background: rgba(35, 35, 38, 0.6) !important; 
      backdrop-filter: blur(12px) !important; 
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 50% !important; 
      width: 52px !important;
      height: 52px !important;
      bottom: 30px !important;
      right: 30px !important; 
      left: auto !important; 
      padding: 0 !important;
      justify-content: center !important;
      align-items: center !important;
      z-index: 9999 !important;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3) !important;
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.2s ease !important;
    }

    .sidebar-toggle:active {
      transform: scale(0.85) !important; 
      background: rgba(55, 55, 60, 0.8) !important;
    }

    .sidebar-toggle span {
      display: none !important;
    }

    /* 中心内圈：改为低调的灰色 */
    .sidebar-toggle::after {
      content: '' !important;
      display: block !important;
      width: 22px !important;
      height: 22px !important;
      border-radius: 50% !important;
      background: rgba(113, 113, 122, 0.8) !important; /* 沉稳的灰色 (Zinc 500) */
      box-shadow: 0 0 8px rgba(113, 113, 122, 0.15) !important;
      transition: background 0.2s ease !important;
    }

    /* 鼠标悬停时：灰点微微提亮 */
    .sidebar-toggle:hover::after {
      background: rgba(161, 161, 170, 0.95) !important; /* 稍微亮一点的灰 (Zinc 400) */
    }

    /* ========================================= */
    /* ====== 7. 移动端(手机)深度完美适配 ====== */
    /* ========================================= */
    @media screen and (max-width: 768px) {
      .sidebar { padding-top: 20px; }
      .content { padding-top: 20px; }
      .markdown-section {
        padding: 30px 24px !important; 
        border-radius: 0 !important; 
        box-shadow: none; 
        border: none;
        border-top: 1px solid var(--border-color);
        background: transparent !important;
      }
      
      .sidebar-toggle {
        width: 48px !important;
        height: 48px !important;
        bottom: 24px !important;
        right: 20px !important;
      }
      .sidebar-toggle::after {
        width: 20px !important;
        height: 20px !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">系统初始化中...</div>
  
  <script>
    window.$docsify = {
      name: '土块的学术库', 
      repo: '', 
      loadSidebar: true, 
      subMaxLevel: 3, 
      sidebarDisplayLevel: 1, 
      auto2top: true,
      routerMode: 'hash'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>学术知识库 Beta 2.0</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="个人学术知识库">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- 引入默认的主题样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <!-- 引入专业学术字体：Inter (正文) + Noto Serif SC (标题) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      /* 学术沉稳的翡翠绿 */
      --theme-color: #10b981; 
      --theme-color-light: rgba(16, 185, 129, 0.15);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --bg-dark: #0f172a;
    }

    /* ====== 1. 全局背景：深邃的学术氛围 ====== */
    body {
      background-color: var(--bg-dark) !important;
      /* 干净的深蓝/黑渐变背景，替代原来的繁杂图片 */
      background-image: radial-gradient(circle at top right, #1e293b, #020617);
      color: var(--text-main) !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      font-size: 16px; 
    }

    /* ====== 2. 侧边栏修复与强化 ====== */
    .sidebar {
      background: rgba(15, 23, 42, 0.8) !important;
      border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
      padding-top: 30px;
      /* 确保侧边栏的文字不会被背景影响 */
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }

    .sidebar h1 {
      font-family: 'Noto Serif SC', serif !important;
      color: var(--theme-color) !important;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar h1 a { color: inherit; }

    /* 侧边栏层级标题 (例如：Java Standard Edition) */
    .sidebar-nav > ul > li > p {
        color: #cbd5e1 !important;
        font-weight: 600;
        font-size: 14px;
        margin-top: 15px;
        margin-bottom: 5px;
        padding-left: 15px;
        border-left: 3px solid #334155;
    }

    /* 侧边栏可点击的链接 */
    .sidebar-nav ul li a {
      color: var(--text-muted) !important;
      font-size: 13px;
      padding: 8px 15px;
      margin: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s ease;
      cursor: pointer !important;
      white-space: normal; /* 允许过长的标题换行 */
      line-height: 1.4;
    }

    .sidebar-nav ul li a:hover {
      background: rgba(255, 255, 255, 0.05) !important;
      color: var(--text-main) !important;
    }

    .sidebar-nav ul li.active > a {
      background: var(--theme-color-light) !important;
      color: var(--theme-color) !important;
      font-weight: 600;
      border-right: 3px solid var(--theme-color) !important;
    }

    /* ====== 3. 主内容区：绝对清晰，不再模糊 ====== */
    .content {
      padding-top: 40px;
      display: flex;
      justify-content: center;
    }

    .markdown-section {
      /* 调整面板背景，减少 blur，增加不透明度，确保文字清晰 */
      background: rgba(30, 41, 59, 0.85); 
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      border-radius: 16px;
      padding: 50px 70px;
      max-width: 900px;
      color: var(--text-main);
      /* 相对定位，确保层级在最上 */
      position: relative;
      z-index: 10; 
    }

    /* 首页 README 特大标题 */
    .markdown-section h1:first-of-type {
      font-family: 'Noto Serif SC', serif !important;
      color: var(--theme-color) !important;
      font-size: 38px !important;
      font-weight: 900;
      text-align: center;
      margin-bottom: 40px;
      border-bottom: none !important;
    }

    /* 正文标题 (h2, h3) */
    .markdown-section h2, 
    .markdown-section h3 {
      font-family: 'Noto Serif SC', serif !important;
      color: #e2e8f0 !important;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.08) !important;
      padding-bottom: 10px;
      margin-top: 35px;
    }

    /* 正文内容 */
    .markdown-section p, 
    .markdown-section li {
      font-size: 16px;
      line-height: 1.8;
      color: #cbd5e1;
    }

    /* 链接颜色 */
    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
    }
    .markdown-section a:hover {
      text-decoration: underline;
    }

    /* 代码块：深色沉稳风格 */
    .markdown-section pre,
    .markdown-section code {
      background: #020617 !important;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #38bdf8;
      border-radius: 8px;
      font-family: 'Courier New', Courier, monospace !important;
    }

    /* 引用块 */
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      padding: 10px 20px;
      border-radius: 0 8px 8px 0;
    }
  </style>
</head>
<body>
  <div id="app">系统初始化中...</div>
  
  <script>
    window.$docsify = {
      name: '学术知识库 Beta 2.0',
      repo: '', 
      loadSidebar: true, 
      subMaxLevel: 2,    
      auto2top: true,
      // 开启路由跳转，这有时能解决特殊字符路径点击不刷新的问题
      routerMode: 'hash'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
